name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }}, py${{ matrix.py }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,   py: "3.10" }   # min supported
          - { os: ubuntu-latest,   py: "3.12" }
          - { os: ubuntu-24.04-arm, py: "3.12" }  # arm64 — prove it installs+runs
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}

      - name: Install (with autopair extra) + build deps
        run: |
          python -m pip install --upgrade pip build
          python -m pip install ".[autopair]"

      - name: Import smoke test
        run: |
          python -c "import claude_buddy, claude_buddy.daemon, claude_buddy.hook, claude_buddy.pair, claude_buddy.setup_cmd; print('import ok', claude_buddy.__version__)"

      - name: CLI smoke test
        run: |
          claude-buddy --help
          claude-buddy hook < /dev/null   # fail-open: exits 0 with no daemon

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload artifacts (x86_64 / py3.12 only)
        if: matrix.os == 'ubuntu-latest' && matrix.py == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
